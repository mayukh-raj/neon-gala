<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Neon Gala</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a0000 0%, #4a000e 50%, #1a0000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212,175,55,0.25);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 48px 44px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .logo-area {
            margin-bottom: 28px;
        }
        .logo-area img {
            height: 56px;
            object-fit: contain;
            margin-bottom: 10px;
        }
        .logo-area h1 {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            color: white;
            letter-spacing: 2px;
        }
        .logo-area h1 span {
            background: linear-gradient(to right, #d4af37, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo-area p {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .error-msg {
            background: rgba(220, 60, 60, 0.2);
            border: 1px solid rgba(220, 60, 60, 0.4);
            color: #ff8080;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .field {
            margin-bottom: 16px;
            text-align: left;
        }
        .field label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 7px;
        }
        .field input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 10px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .field input::placeholder { color: rgba(255,255,255,0.25); }
        .field input:focus { border-color: rgba(212,175,55,0.6); }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(to right, #d4af37, #f0cd5a);
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #3a2a00;
            cursor: pointer;
            margin-top: 6px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 22px rgba(212,175,55,0.4);
        }

        .back-link {
            display: block;
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: rgba(255,255,255,0.7); }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo-area">
            <img src="/static/logo.png" alt="Neon Gala Logo">
            <h1>NEON <span>GALA</span></h1>
            <p>Admin Panel</p>
        </div>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="field">
                <label>Username</label>
                <input name="username" placeholder="Enter username" autocomplete="username">
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn">Login</button>
        </form>

        <a href="/" class="back-link">← Back to website</a>
    </div>

</body>
</html>
